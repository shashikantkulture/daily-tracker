<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Work Tracker — Dashboard</title>
    <meta name="description" content="Daily client work tracker — dark red theme." />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
        /* ─── TOKENS ─────────────────────────────── */
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --card2: #1c1c1c;
            --red: #dc2626;
            --red-soft: #ef4444;
            --red-dim: rgba(220, 38, 38, 0.18);
            --red-glow: rgba(220, 38, 38, 0.35);
            --white: #f8fafc;
            --muted: #6b7280;
            --muted2: #374151;
            --green: #16a34a;
            --green-soft: #22c55e;
            --border: rgba(255, 255, 255, 0.07);
            --border-red: rgba(220, 38, 38, 0.4);
            --border-grn: rgba(34, 197, 94, 0.35);
            --sidebar-w: 380px;
            --glass: rgba(15, 15, 15, 0.7);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            height: 100%; height: -webkit-fill-available;
            overflow: hidden; background: var(--bg); 
            color: var(--white); font-family: 'Inter', sans-serif; 
        }

        /* ─── BG DECOR ────────────────────────────── */
        .bg-glow-wrap {
            position: fixed; inset: 0; z-index: -1; overflow: hidden;
            pointer-events: none; background: var(--bg);
        }
        .glow-blob {
            position: absolute; width: 60vw; height: 60vw;
            border-radius: 50%; filter: blur(100px); opacity: 0.1;
            animation: move-glow 25s infinite alternate ease-in-out;
        }
        .glow-1 { background: var(--red); top: -10%; left: -10%; }
        .glow-2 { background: #1e3a8a; bottom: -10%; right: -10%; animation-delay: -12.5s; }
        
        @keyframes move-glow {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { transform: translate(15%, 15%) scale(1.1) rotate(20deg); }
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 64px 64px; z-index: 0; pointer-events: none;
        }

        /* ─── LAYOUT ─────────────────────────────── */
        #app {
            position: relative; z-index: 1; 
            height: 100vh; height: -webkit-fill-available;
            display: flex; flex-direction: column; transition: filter 0.3s;
        }
        body.is-locked #app, 
        body.is-locked #backlogTrigger,
        body.is-locked #backlogStatsTrigger {
            filter: blur(20px) brightness(.4); pointer-events: none;
        }

        /* ─── TOP BAR ────────────────────────────── */
        .top-bar {
            flex-shrink: 0; padding: 1.2rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px);
        }
        .top-bar h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
        .top-bar p { font-size: 0.85rem; color: var(--muted); }
        .top-bar-right { display: flex; align-items: center; gap: 0.8rem; }

        .slide-counter { font-size: 0.85rem; font-weight: 600; color: var(--muted); padding-right: 0.5rem; }
        
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; border-radius: 8px; }
        .sync-btn { background: var(--red); color: white; padding: 0.6rem 1.2rem; font-weight: 700; font-size: 0.85rem; }
        .sync-btn:hover { background: var(--red-soft); transform: translateY(-1px); }
        .cal-btn, .yt-btn, .side-toggle-btn { 
            background: var(--card2); color: white; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .cal-btn:hover, .yt-btn:hover { background: var(--muted2); }

        /* ─── MUSIC BEAT GLOW ────────────────────── */
        @keyframes beatPulse {
            0% { box-shadow: 0 0 0 0 var(--red-glow); transform: scale(1); }
            50% { box-shadow: 0 0 20px 10px rgba(220, 38, 38, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); transform: scale(1); }
        }
        .yt-btn.is-playing {
            animation: beatPulse 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--red);
            border-color: var(--red-soft);
        }

        /* ─── SLIDER ─────────────────────────────── */
        .slider-viewport {
            flex-grow: 1; overflow: hidden; position: relative;
        }
        .slides-track {
            display: flex; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .slide {
            flex: 0 0 100%; width: 100%; height: 100%; display: flex; align-items: flex-start; justify-content: center;
            overflow-y: auto; padding: 2rem;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
            overscroll-behavior-y: contain; /* Prevent pull-to-refresh */
        }

        .client-column {
            width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 1rem;
            animation: slideFadeIn 0.5s ease both;
        }
        @keyframes slideFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ─── CARDS ──────────────────────────────── */
        .client-header-card {
            background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .client-header-card.done-card { border-color: var(--border-grn); }
        .client-header-card::after {
            content: ''; position: absolute; top: -20px; right: -20px; width: 100px; height: 100px;
            background: radial-gradient(circle, var(--red-glow), transparent 70%); z-index: 0; opacity: 0.4;
        }
        .client-name-editable { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }

        .prog-bar-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 1rem; overflow: hidden; }
        .prog-bar-fill { height: 100%; background: var(--red); transition: width 0.4s ease; }
        .done-card .prog-bar-fill { background: var(--green); }

        .progress-pill { 
            font-size: 0.75rem; font-weight: 700; background: var(--red-dim); color: var(--red-soft);
            padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--border-red);
        }
        .progress-pill.done { background: rgba(22, 163, 74, 0.1); color: var(--green-soft); border-color: var(--border-grn); }

        .tasks-floating { display: flex; flex-direction: column; gap: 0.7rem; }
        .task-card {
            background: var(--card); border: 1px solid var(--border); padding: 1rem; border-radius: 16px;
            display: flex; align-items: center; gap: 1rem; transition: 0.2s; cursor: pointer;
        }
        .task-card:hover { border-color: var(--border-red); background: var(--card2); }
        .task-card.done { opacity: 0.6; }
        .task-check {
            width: 24px; height: 24px; border: 2px solid var(--muted); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--green);
        }
        .task-card.done .task-check { border-color: var(--green); background: rgba(22, 163, 74, 0.1); }
        .task-name { flex-grow: 1; font-weight: 500; font-size: 0.95rem; }

        /* ─── TIMER CARD ─────────────────────────── */
        .timer-card { 
            background: var(--card2); border: 1px solid var(--border); padding: 1.2rem; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 0.8rem; margin-top: 1rem;
        }
        .timer-digits { font-size: 2.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .timer-ms { font-size: 1.1rem; color: var(--red-soft); margin-left: 2px; }
        .timer-btns { display: flex; gap: 0.6rem; }
        .btn { padding: 0.6rem 1.2rem; font-weight: 700; border-radius: 10px; font-size: 0.85rem; }
        .btn-start { background: var(--green); color: white; }
        .btn-stop { background: var(--red); color: white; }
        .btn-reset { color: var(--muted); font-size: 0.8rem; font-weight: 600; background: transparent; }

        /* ─── BOTTOM NAV ─────────────────────────── */
        .bottom-nav {
            padding: 1rem 2rem; border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
        }
        .nav-btn { padding: 0.6rem 1.5rem; background: var(--card2); color: white; font-weight: 600; }
        .nav-btn.primary { background: white; color: black; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .dot-indicators { display: flex; gap: 0.5rem; }
        .dot { 
            width: 8px; height: 8px; background: var(--muted2); border-radius: 10px; transition: 0.3s; cursor: pointer; 
            padding: 10px; margin: -10px; /* Increase hit area without changing visual size */
        }
        .dot.active { width: 24px; background: var(--red); }
        .dot.completed-dot { background: var(--green); }

        /* ─── SIDEBAR (ROUTINE) ──────────────────── */
        #routineSidebar {
            position: fixed; top: 0; right: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100vh;
            background: var(--glass); border-left: 1px solid var(--border); z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            visibility: hidden; pointer-events: none;
        }
        #routineSidebar.open { transform: translateX(calc(-1 * var(--sidebar-w))); visibility: visible; pointer-events: all; }
        
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-title { font-weight: 800; font-size: 1.1rem; color: var(--red-soft); }
        
        .routine-progress { padding: 1.5rem 1.5rem 0; }
        .rp-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
        .rp-bar { height: 6px; background: var(--muted2); border-radius: 10px; overflow: hidden; }
        .rp-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--red-soft)); width: 0%; transition: width 1s linear; }

        .routine-list { flex-grow: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .routine-item { 
            padding: 1rem 1.25rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.03); 
            display: flex; align-items: center; gap: 1rem; transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }
        .routine-item:hover { background: rgba(255,255,255,0.05); transform: translateX(-4px); }
        .routine-item.active { 
            background: var(--red-dim); border-color: var(--border-red); 
            border-left: 4px solid var(--red); 
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.1);
        }
        .ri-time { font-size: 0.7rem; font-weight: 700; color: var(--muted); min-width: 75px; }
        .active .ri-time { color: var(--red-soft); }
        .ri-label { font-size: 0.9rem; font-weight: 600; }
        
        .side-toggle-floater {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%); z-index: 999;
            background: var(--red); color: white; width: 32px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px 0 0 12px; box-shadow: -4px 0 15px rgba(220, 38, 38, 0.4);
            writing-mode: vertical-lr; text-orientation: mixed; font-size: 0.75rem; font-weight: 800; cursor: pointer;
        }

        /* ─── MODALS ─────────────────────────────── */
        #adminLock {
            position: fixed; inset: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(40px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .lock-card { background: var(--card); border: 1px solid var(--border); padding: 2.5rem; border-radius: 30px; width: 380px; text-align: center; }
        .lock-input { 
            width: 100%; background: var(--card2); border: 1px solid var(--border); 
            padding: 1rem; color: white; font-weight: 700; margin: 1.5rem 0; border-radius: 12px; outline: none;
            text-align: center; font-size: 1.1rem;
        }
        .lock-btn { width: 100%; background: var(--red); color: white; padding: 1rem; font-weight: 800; border-radius: 12px; }

        /* ─── TOAST ──────────────────────────────── */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(50px);
            background: var(--card2); border: 1px solid var(--border-red); padding: 0.8rem 1.5rem;
            border-radius: 99px; font-weight: 700; z-index: 3000; opacity: 0; transition: 0.3s;
            pointer-events: none; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ─── QUOTE BAR ──────────────────────────── */
        .quote-bar { padding: 0.6rem 2rem; background: var(--card2); font-size: 0.75rem; color: var(--muted); text-align: center; border-bottom: 1px solid var(--border); }

        @media (max-width: 600px) {
            .top-bar { padding: 1rem; }
            .top-bar-left h1 { font-size: 1.1rem; }
            .top-bar-right { gap: 0.5rem; }
            .yt-btn { display: none; } /* Hide YT on very small screens to save space, or keep? User asked for it. Let's keep. */
            .top-bar-right .yt-btn { display: flex; width: 32px; height: 32px; font-size: 0.9rem; }
            .sync-btn { padding: 0.5rem 0.8rem; font-size: 0.7rem; }
            .slide { padding: 1rem 0.8rem; }
            .client-column { gap: 0.8rem; }
            .client-header-card { padding: 1rem; border-radius: 16px; }
            .client-name-editable { font-size: 1.25rem; }
            .timer-digits { font-size: 1.8rem; }
            .bottom-nav { padding: 0.8rem; display: flex !important; } /* Ensure visibility */
            .nav-btn { padding: 0.6rem 0.8rem; font-size: 0.75rem; min-width: 80px; }
            .nav-btn.primary { background: var(--red); color: white; }
            .dot-indicators { gap: 0.3rem; }
            .dot { width: 6px; height: 6px; }
            .dot.active { width: 18px; }
            .side-toggle-floater { height: 70px; width: 26px; font-size: 0.6rem; border-radius: 10px 0 0 10px; }
        }

        /* ─── PC TIMELINES ────────────────────────── */
        .pc-bottom-timeline { display: none; }
        .pc-right-timeline { display: none; }

        @media (min-width: 601px) {
            .pc-bottom-timeline {
                display: flex; width: 100%; height: 22px;
                background: rgba(255, 255, 255, 0.02); position: relative;
                opacity: 0.6; transition: opacity 0.3s, height 0.3s;
                border-top: 1px solid var(--border);
            }
            .pc-bottom-timeline:hover {
                opacity: 1; height: 35px; background: rgba(10, 10, 10, 0.9);
            }
            .pt-segment {
                flex: 1; border-right: 1px solid rgba(255,255,255,0.05); position: relative;
                display: flex; align-items: center; justify-content: center;
                color: var(--muted); font-size: 0.6rem; font-weight: 600;
                transition: all 0.3s; cursor: default; white-space: nowrap; overflow: hidden;
            }
            .pt-segment.active-segment { background: rgba(220, 38, 38, 0.15); color: var(--red-soft); box-shadow: inset 0 -2px 0 var(--red); }
            .pc-bottom-timeline:hover .pt-segment { color: var(--muted); font-size: 0.75rem; }
            .pc-bottom-timeline:hover .pt-segment.active-segment {
                background: var(--red); color: white; transform: scale(1.05); z-index: 10;
                box-shadow: 0 0 10px var(--red-glow);
            }

            .pc-right-timeline {
                display: flex; flex-direction: column;
                position: fixed; top: 120px; right: 20px; width: 320px;
                bottom: 80px; z-index: 50; opacity: 0.7;
                overflow-y: auto; gap: 0.6rem; transition: opacity 0.3s;
                padding-right: 10px;
            }
            .pc-right-timeline:hover { opacity: 1; }
            .pc-right-timeline::-webkit-scrollbar { width: 4px; }
            .pc-right-timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
            
            .rt-item {
                display: flex; align-items: center; gap: 1rem;
                padding: 1rem 1.2rem; border-radius: 12px;
                background: var(--card2); border: 1px solid var(--border-red);
                transition: 0.3s; animation: slideFadeIn 0.5s ease both;
            }
            .rt-item .rt-status {
                width: 12px; height: 12px; border-radius: 50%; background: var(--red);
                box-shadow: 0 0 8px var(--red-glow); flex-shrink: 0;
            }
            .rt-item.done-task { border-color: var(--border-grn); }
            .rt-item.done-task .rt-status { background: var(--green); box-shadow: 0 0 8px var(--border-grn); }
            .rt-client { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
            .rt-task { font-size: 0.9rem; font-weight: 600; color: white; line-height: 1.3; }
        }

        /* ─── ANIMATIONS ─────────────────────────── */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .side-toggle-floater { animation: pulse-glow 2s infinite; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .client-header-card { animation: float 4s ease-in-out infinite; }
        .client-header-card.done-card { animation-play-state: paused; }

        @keyframes subtle-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .sync-btn.has-changes {
            background: linear-gradient(-45deg, #dc2626, #991b1b, #ef4444, #dc2626);
            background-size: 400% 400%;
            animation: subtle-bg 3s ease infinite;
        }

        /* ─── HEARTBEAT GLOW ───────────────────────── */
        @keyframes heartbeatBg {
            0% { transform: scale(1); filter: blur(100px) brightness(1); }
            15% { transform: scale(1.15); filter: blur(120px) brightness(1.6); }
            30% { transform: scale(1); filter: blur(100px) brightness(1); }
            45% { transform: scale(1.15); filter: blur(120px) brightness(1.6); }
            100% { transform: scale(1); filter: blur(100px) brightness(1); }
        }

        body.heartbeat-mode .bg-glow-wrap {
            background: rgba(40, 0, 0, 0.4);
        }
        body.heartbeat-mode .glow-1, body.heartbeat-mode .glow-2 {
            background: #ff0000 !important;
            animation: heartbeatBg 1.5s infinite !important;
            opacity: 0.25;
        }

        /* ─── QUOTE GLOW ──────────────────────────── */
        .quote-bar {
            transition: all 0.5s ease;
        }
        .quote-glow-active {
            text-shadow: 0 0 10px var(--red-glow), 0 0 20px var(--red);
            color: #fff;
            transform: scale(1.02);
        }

        @keyframes pulse-glow-grn {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>

<body class="is-locked">

    <div class="bg-glow-wrap">
        <div class="glow-blob glow-1"></div>
        <div class="glow-blob glow-2"></div>
    </div>

    <div id="adminLock">
        <div class="lock-card">
            <h2 style="font-size:1.8rem; font-weight:900; margin-bottom:0.4rem">🔐 Secure Access</h2>
            <p style="color:var(--muted); font-size:0.9rem; margin-bottom:1.5rem">Enter administrator password</p>
            
            <div style="margin-bottom:1.2rem; text-align:left">
              <input type="password" id="adminPassInput" class="lock-input" placeholder="Password..." />
            </div>
            
            <button class="lock-btn" id="unlockBtn">Unlock Dashboard →</button>
            <div id="lockError" style="color:var(--red-soft); margin-top:1rem; font-size:0.85rem; display:none">Access Denied</div>
        </div>
    </div>

    <div id="app">
        <header class="top-bar">
            <div class="top-bar-left">
                <h1>Execution Dashboard</h1>
                <p>Track your daily grind</p>
            </div>
            <div class="top-bar-right">
                <div class="slide-counter"><span id="currSlide">1</span>/<span id="totalSlide">7</span></div>
                <button class="sync-btn" onclick="refreshData()">🔄 Refresh</button>
                <button class="cal-btn" onclick="openHistory()" title="History">📅</button>
                <button class="yt-btn" id="ytMusicBtn" onclick="playRandomMusic()" title="YouTube Music">▶</button>
            </div>
        </header>

        <div class="quote-bar" id="quoteBar">Loading daily fuel...</div>

        <div class="slider-viewport">
            <div class="slides-track" id="slidesTrack"></div>
        </div>

        <div class="pc-right-timeline" id="pcRightTimeline"></div>

        <div class="pc-bottom-timeline" id="pcBottomTimeline"></div>

        <nav class="bottom-nav">
            <button class="nav-btn" id="prevBtn" onclick="goSlide(-1)">← Prev</button>
            <div class="dot-indicators" id="dotIndicators"></div>
            <button class="nav-btn primary" id="nextBtn" onclick="goSlide(1)">Next →</button>
        </nav>
    </div>

    <!-- ROUTINE SIDEBAR -->
    <div id="routineSidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">ASSISTANT LAYER</span>
            <button class="btn-reset" onclick="toggleSidebar()" style="font-size:1.2rem">✕</button>
        </div>
        <div class="routine-progress">
            <div class="rp-label">
                <span>Daily Routine Progress</span>
                <span id="rpPercent">0%</span>
            </div>
            <div class="rp-bar"><div class="rp-fill" id="rpFill"></div></div>
        </div>
        <div class="routine-list" id="routineList"></div>
    </div>

    <div class="side-toggle-floater" onclick="toggleSidebar()">ROUTINE LAYER</div>

    <div id="historyModal" style="position:fixed; inset:0; background:rgba(10,10,10,0.95); z-index:3000; display:none; flex-direction:column; padding:2rem; overflow-y:auto; backdrop-filter:blur(20px)">
        <div style="display:flex; justify-content:space-between; margin-bottom:2rem; align-items:center">
            <h2 style="font-size:1.8rem; font-weight:900; letter-spacing:-0.04em">📅 Work History</h2>
            <button class="sync-btn" onclick="closeHistory()">Close Panel</button>
        </div>
        <div id="historyBody" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:1.5rem"></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- SUPABASE LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- MODULAR SAAS LOGIC -->
    <script type="module">
        import supabase from './js/supabaseClient.js';
        import { checkSession, login, logout } from './js/auth.js';
        import { startWork, stopWork, getActiveSession } from './js/timer.js';
        import { subscribeToAllData } from './js/realtime.js';
        import { renderReactions } from './js/ui-addons.js';

        // Global state
        let state = { clients: [], checked: {}, sessions: {}, feedback: [] };
        let currentSlide = 0;
        let onlineClients = {};
        
        async function init() {
            const authData = await checkSession('admin');
            if (!authData) {
                document.body.classList.add('is-locked');
                document.getElementById('adminLock').style.display = 'flex';
                return;
            }

            document.body.classList.remove('is-locked');
            document.getElementById('adminLock').style.display = 'none';

            // Initial Fetch
            await refreshData();
            
            // Subscriptions
            subscribeToAllData(() => refreshData());

            // Client Presence Tracker
            const presenceChannel = supabase.channel('online-users');
            presenceChannel.on('presence', { event: 'sync' }, () => {
                const presenceState = presenceChannel.presenceState();
                onlineClients = {};
                for (const id in presenceState) {
                    presenceState[id].forEach(user => {
                        onlineClients[user.client_id] = true;
                    });
                }
                renderSlides();
            }).subscribe();

            renderRoutine();
            updateRoutine();
            setInterval(updateRoutine, 10000);
            window.addEventListener('resize', () => goToSlide(currentSlide, false));
            
            // Add swipe detection
            let touchStartX = 0;
            let touchStartY = 0;
            const track = document.getElementById('slidesTrack');
            track.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});
            track.addEventListener('touchend', e => {
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                if (Math.abs(touchEndX - touchStartX) > Math.abs(touchEndY - touchStartY) && Math.abs(touchEndX - touchStartX) > 40) {
                    if (touchEndX < touchStartX) window.goSlide(1);
                    if (touchEndX > touchStartX) window.goSlide(-1);
                }
            }, {passive: true});

            
            // Start Quote Rotation
            rotateAdminQuotes();
            setInterval(rotateAdminQuotes, 10000);
        }

        const ADMIN_QUOTES = [
            "Focus is a muscle. Train it.",
            "Small steps every day.",
            "Consistency beats intensity.",
            "One task at a time.",
            "Turn off distractions. Turn on execution."
        ];
        let adminQuoteIdx = 0;
        function rotateAdminQuotes() {
            const qBar = document.getElementById('quoteBar');
            if (!qBar) return;
            qBar.classList.remove('quote-glow-active');
            setTimeout(() => {
                qBar.textContent = ADMIN_QUOTES[adminQuoteIdx];
                qBar.classList.add('quote-glow-active');
                adminQuoteIdx = (adminQuoteIdx + 1) % ADMIN_QUOTES.length;
            }, 500);
        }

        async function refreshData() {
            const [c, s, f] = await Promise.all([
                supabase.from('clients').select('*, tasks(*)'),
                supabase.from('work_sessions').select('*').eq('is_active', true),
                supabase.from('emoji_feedback').select('*')
            ]);
            
            state.clients = c.data || [];
            state.sessions = (s.data || []).reduce((acc, sess) => ({ ...acc, [sess.client_id]: sess }), {});
            state.feedback = f.data || [];
            
            // Heartbeat Logic
            if (Object.keys(state.sessions).length > 0) {
                document.body.classList.add('heartbeat-mode');
            } else {
                document.body.classList.remove('heartbeat-mode');
            }
            
            renderSlides();
            renderDots();
            renderRightTimeline();
        }

        window.refreshData = refreshData;

        function renderRightTimeline() {
            const list = document.getElementById('pcRightTimeline');
            if (!list) return;
            let allTasksHtml = '';
            state.clients.forEach(c => {
                const tasks = c.tasks || [];
                tasks.forEach(t => {
                    allTasksHtml += `
                        <div class="rt-item ${t.status === 'completed' ? 'done-task' : ''}">
                            <div class="rt-status"></div>
                            <div>
                                <div class="rt-client">${c.business_name}</div>
                                <div class="rt-task">${t.title}</div>
                            </div>
                        </div>
                    `;
                });
            });
            list.innerHTML = allTasksHtml;
        }

        // --- UI RENDERING (Matching Original Theme) ---
        function renderSlides() {
            const track = document.getElementById('slidesTrack');
            if (!track) return;
            track.innerHTML = '';
            document.getElementById('totalSlide').textContent = state.clients.length;
            
            state.clients.forEach((c) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.innerHTML = buildColumn(c);
                track.appendChild(slide);
            });
            goToSlide(currentSlide, false);
        }

        function buildColumn(c) {
            const tasks = c.tasks || [];
            const done = tasks.filter(t => t.status === 'completed').length;
            const total = tasks.length;
            const pct = total > 0 ? Math.round((done/total)*100) : 0;
            const isAll = done === total && total > 0;
            const activeSession = state.sessions[c.id];

            const taskHtml = tasks.map((t) => {
                const taskFeedback = state.feedback.filter(f => f.task_id === t.id);
                return `
                    <div class="task-card ${t.status === 'completed'?'done':''}" onclick="updateTaskStatus('${t.id}', '${t.status === 'completed' ? 'pending' : 'completed'}')">
                        <div class="task-check">${t.status === 'completed'?'✓':''}</div>
                        <div style="flex:1; display:flex; justify-content:space-between; align-items:center">
                            <span class="task-name">${t.title}</span>
                            <div class="reactions-box">${renderReactions(taskFeedback)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="client-column">
                    <div class="client-header-card ${isAll?'done-card':''}">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span class="client-name-editable">
                                ${c.business_name}
                                ${onlineClients[c.id] ? `<span style="display:inline-block; width:10px; height:10px; background:var(--green); border-radius:50%; margin-left:8px; box-shadow:0 0 8px var(--green); animation: pulse-glow-grn 2s infinite" title="Online now"></span>` : ''}
                            </span>
                            <span class="progress-pill ${isAll?'done':''}">${done}/${total}</span>
                        </div>
                        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
                    </div>
                    <div class="tasks-floating">${taskHtml}</div>
                    <div class="timer-card">
                        ${activeSession ? `
                            <div style="font-weight:700; color:var(--red-soft); font-size:1.1rem">🔥 WORKING NOW...</div>
                            <button class="btn btn-stop" onclick="handleStopWork('${c.id}', '${activeSession.id}')">Stop Work</button>
                        ` : `
                            <button class="btn btn-start" onclick="handleStartWork('${c.id}')">Start Work Session</button>
                        `}
                    </div>
                </div>
            `;
        }

        // --- EXPOSED FUNCTIONS ---
        window.updateTaskStatus = async (taskId, newStatus) => {
            await supabase.from('tasks').update({ status: newStatus }).eq('id', taskId);
        };

        window.handleStartWork = async (clientId) => {
            await startWork(clientId);
            refreshData();
        };

        window.handleStopWork = async (clientId, sessionId) => {
            const mins = await stopWork(sessionId);
            alert(`Session ended: ${Math.round(mins)} minutes logged.`);
            refreshData();
        };

        window.checkAdminPass = async () => {
            console.log("Admin login attempt...");
            const email = 'singhshashikant301@gmail.com'; 
            const pass = document.getElementById('adminPassInput').value;
            if (!pass) return;
            
            try {
                await login(email, pass);
                console.log("Login success.");
            } catch (e) {
                console.error("Login failed:", e);
                const err = document.getElementById('lockError');
                err.textContent = "Login Failed: " + (e.message || "Check credentials.");
                err.style.display = 'block';
            }
        };

        // Attach Listeners
        document.getElementById('unlockBtn').onclick = () => window.checkAdminPass();
        document.getElementById('adminPassInput').onkeydown = (e) => {
            if (e.key === 'Enter') window.checkAdminPass();
        };

        window.doLogout = () => logout();
        window.goSlide = (dir) => goToSlide(currentSlide + dir);
        window.toggleSidebar = () => document.getElementById('routineSidebar').classList.toggle('open');

        window.playRandomMusic = () => {
            const playlists = [
                'https://music.youtube.com/watch?v=jfKfPfyJRdk', // Lofi Girl
                'https://music.youtube.com/watch?v=5qap5aO4i9A', // Synthwave
                'https://music.youtube.com/watch?v=DWcJFNfaw9c', // Deep Focus
                'https://music.youtube.com/watch?v=7NOSDKb0HlU', // Coffee Shop
                'https://music.youtube.com/watch?v=BeO_m0uA-0E'  // Dark Ambient
            ];
            const random = playlists[Math.floor(Math.random() * playlists.length)];
            window.open(random, '_blank');
            
            const btn = document.getElementById('ytMusicBtn');
            if (btn) btn.classList.add('is-playing');
        };

        // Original UI Helpers
        function goToSlide(idx, anim = true) {
            if (idx < 0 || idx >= state.clients.length) return;
            currentSlide = idx;
            const track = document.getElementById('slidesTrack');
            if (track) {
                track.style.transition = anim ? 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)' : 'none';
                track.style.transform = `translateX(${-currentSlide * 100}%)`;
            }
            const currEl = document.getElementById('currSlide');
            if (currEl) currEl.textContent = currentSlide + 1;
            const pBtn = document.getElementById('prevBtn');
            const nBtn = document.getElementById('nextBtn');
            if (pBtn) pBtn.disabled = currentSlide === 0;
            if (nBtn) nBtn.disabled = currentSlide === state.clients.length - 1;
            renderDots();
        }

        function renderDots() {
            const wrap = document.getElementById('dotIndicators');
            if (!wrap) return;
            wrap.innerHTML = '';
            state.clients.forEach((c, i) => {
                const d = document.createElement('div');
                d.className = `dot ${i===currentSlide?'active':''}`;
                d.onclick = () => window.goSlide(i - currentSlide);
                wrap.appendChild(d);
            });
        }

        function renderRoutine() {
            const ROUTINE = [
                { s: "09:00", e: "09:30", l: "Plan Mode" },
                { s: "09:30", e: "11:30", l: "Deep Work" },
                { s: "11:30", e: "12:00", l: "Reset Break" },
                { s: "12:00", e: "14:00", l: "Execution" },
                { s: "14:00", e: "15:00", l: "Lunch Off" },
                { s: "15:00", e: "17:00", l: "Batch Mode" },
                { s: "17:00", e: "17:30", l: "Quick Break" },
                { s: "17:30", e: "18:30", l: "Client Sync" },
                { s: "18:30", e: "20:00", l: "Buffer Build" },
                { s: "20:00", e: "22:00", l: "Chill Time" },
                { s: "22:00", e: "23:00", l: "GF Time" },
                { s: "23:00", e: "01:00", l: "Night Grind" }
            ];
            const list = document.getElementById('routineList');
            if (list) {
                list.innerHTML = ROUTINE.map((r, i) => `
                    <div class="routine-item" id="ri-${i}">
                        <div class="ri-time">${r.s} - ${r.e}</div>
                        <div class="ri-label">${r.l}</div>
                    </div>
                `).join('');
            }
        }

        let activeRoutineIdx = -1;
        function getIST() { 
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 5.5)); 
        }

        function updateRoutine() {
            const ROUTINE = [
                { s: "09:00", e: "09:30", l: "Plan Mode" },
                { s: "09:30", e: "11:30", l: "Deep Work" },
                { s: "11:30", e: "12:00", l: "Reset Break" },
                { s: "12:00", e: "14:00", l: "Execution" },
                { s: "14:00", e: "15:00", l: "Lunch Off" },
                { s: "15:00", e: "17:00", l: "Batch Mode" },
                { s: "17:00", e: "17:30", l: "Quick Break" },
                { s: "17:30", e: "18:30", l: "Client Sync" },
                { s: "18:30", e: "20:00", l: "Buffer Build" },
                { s: "20:00", e: "22:00", l: "Chill Time" },
                { s: "22:00", e: "23:00", l: "GF Time" },
                { s: "23:00", e: "01:00", l: "Night Grind" }
            ];
            const ist = getIST();
            const nowMin = ist.getHours() * 60 + ist.getMinutes();
            
            let foundIdx = -1;
            ROUTINE.forEach((r, i) => {
                const [sh, sm] = r.s.split(':').map(Number);
                const [eh, em] = r.e.split(':').map(Number);
                let start = sh * 60 + sm;
                let end = eh * 60 + em;
                if (end < start) end += 1440;
                const cur = (nowMin < start && end > 1440) ? nowMin + 1440 : nowMin;
                
                const item = document.getElementById(`ri-${i}`);
                if (item) {
                    if (cur >= start && cur < end) {
                        item.classList.add('active');
                        if (foundIdx === -1) item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        foundIdx = i;
                    } else {
                        item.classList.remove('active');
                    }
                }
            });

            activeRoutineIdx = foundIdx;

            let pcBlocks = '';
            ROUTINE.forEach((r, i) => {
                pcBlocks += `<div class="pt-segment ${i === foundIdx ? 'active-segment' : ''}">${r.l}</div>`;
            });
            const ptEl = document.getElementById('pcBottomTimeline');
            if (ptEl) ptEl.innerHTML = pcBlocks;

            const startDay = 9 * 60;
            const endDay = 25 * 60; 
            let curDay = nowMin < startDay ? nowMin + 1440 : nowMin;
            let pct = Math.max(0, Math.min(100, ((curDay - startDay) / (endDay - startDay)) * 100));
            if (document.getElementById('rpFill')) document.getElementById('rpFill').style.width = pct + '%';
            if (document.getElementById('rpPercent')) document.getElementById('rpPercent').textContent = Math.round(pct) + '%';
        }

        // Initial Run
        init();
    </script>
</body>
</html>
